{% extends "base.html" %}

{% block title %}Главная | Умный помощник{% endblock %}

{% block content %}
<section class="hero">
    <div class="hero-text">
        <h1>Relocate</h1>
        <p class="hero-slogan">переезд быстро и точка</p>
        <div class="actions">
            {% if current_user %}
                <a class="button primary" href="{{ url_for('dashboard') }}">Подобрать город</a>
            {% else %}
                <a class="button primary" href="{{ url_for('login') }}">Войти</a>
                <a class="button" href="{{ url_for('login') }}">Подобрать город</a>
            {% endif %}
        </div>
    </div>
    <div class="hero-image-card">
        <img src="{{ url_for('static', filename='img/relocate-plane.svg') }}" alt="Самолет в небе">
    </div>
</section>
{% endblock %}
