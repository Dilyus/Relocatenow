{% extends "base.html" %}

{% block title %}Вход | Умный помощник{% endblock %}

{% block content %}
<section class="form-card">
    <h1>Вход</h1>
    <form method="post" class="form">
        <label>
            Имя пользователя
            <input type="text" name="username" required>
        </label>
        <label>
            Пароль
            <input type="password" name="password" required>
        </label>
        <button class="button primary" type="submit">Войти</button>
    </form>
    <p class="muted">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
</section>
{% endblock %}
